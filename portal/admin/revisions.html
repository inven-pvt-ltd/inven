<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revision Requests - Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--glass:rgba(17,24,39,.82);--glass-light:rgba(30,41,59,.72);--primary:#6c63ff;--accent:#37d67a;--danger:#f44336;--warning:#ffb300;--text:#f8f8ff;--muted:#a0a4b8;--sidebar-width:220px;--sidebar-collapsed:64px;--transition:.25s cubic-bezier(.4,0,.2,1);--radius:20px;--shadow:0 16px 40px rgba(0,0,0,.32)}
    html,body{height:100%;margin:0;font-family:Inter,sans-serif;background:radial-gradient(circle at top right,rgba(108,99,255,.18),transparent 35%),radial-gradient(circle at bottom left,rgba(55,214,122,.12),transparent 30%),#0f172a;color:var(--text)}
    body{display:flex;min-height:100vh;overflow-x:hidden}.sidebar{width:var(--sidebar-width);background:var(--glass);backdrop-filter:blur(24px);box-shadow:var(--shadow);border-right:1px solid rgba(255,255,255,.05);padding:32px 0 24px;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:100}.logo{font-size:1.6rem;font-weight:700;color:var(--primary);letter-spacing:2px;margin:0 0 32px 32px}.sidebar ul{list-style:none;padding:0;margin:0}.sidebar li{margin-bottom:8px}.sidebar a{display:flex;align-items:center;padding:12px 32px;color:var(--muted);text-decoration:none;font-size:1rem;border-radius:12px 0 0 12px;transition:background var(--transition),color var(--transition)}.sidebar a.active,.sidebar a:hover{background:linear-gradient(90deg,var(--primary),transparent);color:var(--text)}.icon{margin-right:16px;width:22px;text-align:center}.main-content{margin-left:var(--sidebar-width);flex:1;min-height:100vh}.header{display:flex;align-items:center;justify-content:space-between;padding:32px 40px 24px;font-size:2rem;font-weight:700}.main-section{padding:0 40px 40px;display:flex;flex-direction:column;gap:24px}.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px}.card,.table-panel{background:var(--glass);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);backdrop-filter:blur(18px);box-shadow:var(--shadow);padding:24px}.card-title{color:var(--muted);font-size:.95rem;margin-bottom:8px}.card-value{font-size:2rem;font-weight:700}.table-panel{overflow:auto}table{width:100%;border-collapse:collapse;min-width:940px}th,td{padding:14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}th{color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em}.status{display:inline-block;border-radius:8px;padding:4px 12px;font-size:.9em;font-weight:600}.status.active{background:rgba(55,214,122,.18);color:var(--accent)}.status.paused{background:rgba(255,179,0,.18);color:var(--warning)}.status.completed{background:rgba(108,99,255,.18);color:#a8a3ff}.action-btn,.status-select{border:1px solid rgba(255,255,255,.1);border-radius:8px;background:#232a34;color:var(--text);padding:8px 10px;text-decoration:none;cursor:pointer}.delete{color:#ff9aa8}.download{color:#9bb7ff}.description-row{color:var(--muted);font-size:.92rem;background:rgba(255,255,255,.02)}@media(max-width:700px){.sidebar{width:var(--sidebar-collapsed)}.sidebar .logo,.sidebar a span:not(.icon){display:none}.sidebar a{justify-content:center;padding:12px 0;border-radius:12px}.main-content{margin-left:var(--sidebar-collapsed)}.header,.main-section{padding-left:16px;padding-right:16px}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">Inven</div>
    <nav>
      <ul>
        <li><a href="dashboard.html"><span class="icon">&#x1F4C8;</span><span>Dashboard</span></a></li>
        <li><a href="files.html"><span class="icon">&#x1F4C1;</span><span>Files</span></a></li>
        <li><a href="invoices.html"><span class="icon">&#x1F4B3;</span><span>Invoices</span></a></li>
        <li><a class="active" href="revisions.html"><span class="icon">&#x1F504;</span><span>Revision Requests</span></a></li>
      </ul>
    </nav>
  </aside>
  <main class="main-content">
    <header class="header">Revision Requests</header>
    <section class="main-section">
      <div class="cards-row">
        <div class="card"><div class="card-title">Total Requests</div><div class="card-value" id="total-revisions">0</div></div>
        <div class="card"><div class="card-title">Open Requests</div><div class="card-value" id="open-revisions">0</div></div>
        <div class="card"><div class="card-title">Completed</div><div class="card-value" id="completed-revisions">0</div></div>
      </div>
      <div class="table-panel">
        <table id="revisions-table">
          <thead><tr><th>Title</th><th>Client</th><th>Priority</th><th>Status</th><th>Created</th><th>File</th><th>Actions</th></tr></thead>
          <tbody><tr><td colspan="7" style="text-align:center;">Loading revision requests...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="js/revisions.js"></script>
</body>
</html>
