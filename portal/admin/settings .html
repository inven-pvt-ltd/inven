

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVEN Admin Settings</title>
  <style>
    :root {
      --background: #191c23;
      --sidebar: #1f2230;
      --card: rgba(36, 39, 52, 0.85);
      --glass: rgba(36, 39, 52, 0.7);
      --accent: #7b61ff;
      --accent2: #30cfd0;
      --text: #f5f6fa;
      --muted: #9ba1b6;
      --border: #26293a;
      --success: #3fd47d;
      --danger: #ff4f6d;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--background);
      color: var(--text);
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      min-height: 100vh;
    }
    body {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }
    .container {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
    }
    .sidebar {
      width: 220px;
      background: var(--sidebar);
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 1px solid var(--border);
      min-height: 100vh;
      position: sticky;
      top: 0;
    }
    .sidebar h2 {
      margin: 0 0 32px 0;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .sidebar nav {
      width: 100%;
    }
    .sidebar nav a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      padding: 14px 32px;
      font-size: 1rem;
      border-left: 4px solid transparent;
      transition: color 0.2s, border 0.2s, background 0.2s;
    }
    .sidebar nav a.active,
    .sidebar nav a:hover {
      color: var(--accent);
      background: rgba(123,97,255,0.07);
      border-left: 4px solid var(--accent);
    }
    .main-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 0;
    }
    .header {
      font-size: 2rem;
      padding: 32px 40px 16px 40px;
      font-weight: 600;
      letter-spacing: 1px;
      background: transparent;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 0 rgba(0,0,0,0.04);
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 32px;
      padding: 32px 40px 40px 40px;
    }
    .card {
      background: var(--glass);
      border-radius: 18px;
      box-shadow: 0 4px 24px 0 rgba(0,0,0,0.09);
      padding: 32px 24px 24px 24px;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .card h3 {
      margin: 0 0 20px 0;
      font-size: 1.2rem;
      color: var(--accent2);
      font-weight: 500;
    }
    .form-group {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      margin-bottom: 7px;
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 500;
    }
    .form-group input[type="text"], .form-group input[type="email"], .form-group input[type="password"], .form-group textarea {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border: 1.5px solid var(--accent);
    }
    .save-btn {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 0;
      font-size: 1.05rem;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 6px;
      box-shadow: 0 2px 12px 0 rgba(123,97,255,0.10);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .save-btn:hover {
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      box-shadow: 0 4px 20px 0 rgba(48,207,208,0.15);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
    }
    .toggle-row label {
      margin-bottom: 0;
      font-size: 1rem;
      color: var(--text);
      cursor: pointer;
      flex: 1;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333848;
      transition: .3s;
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      transition: .3s;
      border-radius: 50%;
    }
    .switch input:checked + .slider {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .switch input:checked + .slider:before {
      transform: translateX(18px);
    }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 0.93rem;
      font-weight: 500;
      background: #23263a;
      color: var(--success);
      margin-right: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--success);
      letter-spacing: 0.5px;
    }
    @media (max-width: 900px) {
      .settings-grid {
        grid-template-columns: 1fr;
        padding: 22px 8vw 24px 8vw;
      }
      .header {
        padding: 22px 8vw 12px 8vw;
      }
      .sidebar {
        width: 60px;
        padding: 20px 0;
        font-size: 0.9rem;
      }
      .sidebar nav a {
        padding: 14px 10px;
        font-size: 0.97rem;
        text-align: center;
      }
      .sidebar h2 {
        font-size: 1rem;
      }
    }
    @media (max-width: 650px) {
      .sidebar {
        display: none;
      }
      .main-area {
        width: 100vw;
      }
      .header, .settings-grid {
        padding-left: 5vw;
        padding-right: 5vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>INVEN</h2>
      <nav>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/clients.html">Clients</a>
        <a href="/admin/projects.html">Projects</a>
        <a href="/admin/files.html">Files</a>
        <a href="/admin/messages.html">Messages</a>
        <a href="/admin/invoices.html">Invoices</a>
        <a href="/admin/settings.html" class="active">Settings</a>
      </nav>
    </aside>
    <section class="main-area">
      <div class="header">Admin Settings</div>
      <div class="settings-grid">
        <!-- General Settings Card -->
        <div class="card">
          <h3>General Settings</h3>
          <form id="general-settings-form">
            <div class="form-group">
              <label for="companyName">Company Name</label>
              <input type="text" id="companyName" name="companyName" placeholder="Enter company name">
            </div>
            <div class="form-group">
              <label for="supportEmail">Support Email</label>
              <input type="email" id="supportEmail" name="supportEmail" placeholder="support@company.com">
            </div>
            <div class="form-group">
              <label for="website">Website</label>
              <input type="text" id="website" name="website" placeholder="https://company.com">
            </div>
            <button type="submit" class="save-btn">Save</button>
          </form>
        </div>
        <!-- Security Card -->
        <div class="card">
          <h3>Security</h3>
          <form id="security-settings-form">
            <div class="form-group">
              <label for="currentPassword">Current Password</label>
              <input type="password" id="currentPassword" name="currentPassword" placeholder="********">
            </div>
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <input type="password" id="newPassword" name="newPassword" placeholder="********">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm New Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="********">
            </div>
            <div class="toggle-row">
              <label for="2fa-toggle">Enable 2FA</label>
              <span class="switch">
                <input type="checkbox" id="2fa-toggle" name="2fa">
                <span class="slider"></span>
              </span>
            </div>
            <button type="submit" class="save-btn">Save</button>
          </form>
        </div>
        <!-- Notifications Card -->
        <div class="card">
          <h3>Notifications</h3>
          <form id="notifications-settings-form">
            <div class="toggle-row">
              <label for="emailToggle">Email Notifications</label>
              <span class="switch">
                <input type="checkbox" id="emailToggle" name="emailNotifications" checked>
                <span class="slider"></span>
              </span>
            </div>
            <div class="toggle-row">
              <label for="ticketToggle">Ticket Notifications</label>
              <span class="switch">
                <input type="checkbox" id="ticketToggle" name="ticketNotifications">
                <span class="slider"></span>
              </span>
            </div>
            <button type="submit" class="save-btn">Save</button>
          </form>
        </div>
        <!-- Portal Branding Card -->
        <div class="card">
          <h3>Portal Branding</h3>
          <form id="branding-settings-form">
            <div class="form-group">
              <label for="portalTitle">Portal Title</label>
              <input type="text" id="portalTitle" name="portalTitle" placeholder="INVEN Portal">
            </div>
            <div class="form-group">
              <label for="welcomeMessage">Welcome Message</label>
              <textarea id="welcomeMessage" name="welcomeMessage" placeholder="Welcome to the INVEN client portal." rows="2"></textarea>
            </div>
            <button type="submit" class="save-btn">Save</button>
          </form>
        </div>
        <!-- System Status Card -->
        <div class="card">
          <h3>System Status</h3>
          <div>
            <span class="badge" style="color:var(--success);border-color:var(--success);">Firebase: Connected</span>
            <span class="badge" style="color:var(--success);border-color:var(--success);">Auth: Connected</span>
            <span class="badge" style="color:var(--success);border-color:var(--success);">Firestore: Connected</span>
            <span class="badge" style="color:var(--success);border-color:var(--success);">Storage: Connected</span>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script>
    // Intercept all Save buttons to show an alert
    document.querySelectorAll('form').forEach(form => {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Settings saved locally. Connect Firebase to persist changes.');
      });
    });
  </script>
</body>
</html>
