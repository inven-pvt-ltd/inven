<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVEN Admin File Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: rgba(24, 26, 32, 0.95);
            --glass: rgba(17,24,39,0.82);
            --glass-light: rgba(30,41,59,0.72);
            --primary: #6c63ff;
            --accent: #37d67a;
            --danger: #f44336;
            --warning: #ffb300;
            --text: #f8f8ff;
            --muted: #a0a4b8;
            --sidebar-width: 220px;
            --sidebar-collapsed: 64px;
            --transition: 0.25s cubic-bezier(.4,0,.2,1);
            --radius: 24px;
            --shadow: 0 16px 40px rgba(0,0,0,0.32);
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(108,99,255,0.18), transparent 35%), radial-gradient(circle at bottom left, rgba(55,214,122,0.12), transparent 30%), #0f172a;
            color: var(--text);
            min-height: 100vh;
        }
        body {
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 32px 0 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
        }
        .sidebar .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            margin: 0 0 32px 32px;
        }
        .sidebar nav {
            flex: 1;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li {
            margin-bottom: 8px;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 32px;
            color: var(--muted);
            text-decoration: none;
            font-size: 1rem;
            border-radius: 12px 0 0 12px;
            transition: background var(--transition), color var(--transition);
        }
        .sidebar a.active, .sidebar a:hover {
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            color: var(--text);
        }
        .sidebar a .icon {
            margin-right: 16px;
            font-size: 1.2em;
            width: 22px;
            text-align: center;
        }
        .sidebar .settings {
            margin-top: auto;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: transparent;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px 0 40px;
        }
        .header-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .dashboard-wrapper {
            display: flex;
            flex: 1;
            padding: 24px 40px 40px 40px;
            gap: 32px;
            min-height: 0;
        }
        @media (max-width: 1100px) {
            .dashboard-wrapper {
                flex-direction: column;
                gap: 24px;
            }
        }
        @media (max-width: 700px) {
            .sidebar {
                position: fixed;
                width: var(--sidebar-collapsed);
                padding: 24px 0 16px 0;
            }
            .sidebar .logo, .sidebar a span:not(.icon) {
                display: none;
            }
            .sidebar a {
                justify-content: center;
                padding: 12px 0;
                border-radius: 12px;
            }
            .main-content {
                margin-left: var(--sidebar-collapsed);
                padding-left: 0;
            }
            .header, .dashboard-wrapper {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
        @media (max-width: 500px) {
            .header-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
  <aside class="sidebar">
        <div class="logo">Inven</div>
        <nav>
            <ul>
                <li><a href="dashboard.html"><span class="icon">&#x1F4C8;</span><span>Dashboard</span></a></li>
                <li><a href="clients.html"><span class="icon">&#x1F465;</span><span>Clients</span></a></li>
                <li><a href="projects.html"><span class="icon">&#x1F4C4;</span><span>Projects</span></a></li>
                <li><a class="active" href="files.html"><span class="icon">&#x1F4C1;</span><span>Files</span></a></li>
                <li><a href="messages.html"><span class="icon">&#x2709;&#xFE0F;</span><span>Messages</span></a></li>
                <li><a href="invoices.html"><span class="icon">&#x1F4B3;</span><span>Invoices</span></a></li>
            </ul>
        </nav>
        <div class="settings">
            <ul>
                <li><a href="settings.html"><span class="icon">&#9881;&#65039;</span><span>Settings</span></a></li>
            </ul>
        </div>
    </aside>
  <div class="main-content">
    <header class="header">
      File Manager
    </header>
    <main class="main-section">
      <!-- Summary Cards -->
      <div class="cards-row">
        <div class="card">
          <div class="card-title">Total Files</div>
          <div class="card-value" id="total-files">0</div>
        </div>
        <div class="card">
          <div class="card-title">Storage Used</div>
          <div class="card-value" id="storage-used">0 MB</div>
        </div>
        <div class="card">
          <div class="card-title">Recent Uploads</div>
          <div class="card-value" id="recent-uploads">0</div>
        </div>
      </div>

      <!-- Upload Panel -->
      <section class="upload-panel">
        <div class="upload-drag" id="upload-drag">
          Drag &amp; drop files here or click Upload
        </div>
        <button class="upload-btn" id="upload-btn">Upload</button>
        <!-- TODO: Integrate Firebase Storage upload here -->
      </section>

      <!-- Files Table -->
      <section class="files-table-panel">
        <div class="search-row">
          <input type="text" class="search-input" id="search-input" placeholder="Search files...">
        </div>
        <div style="overflow-x:auto;">
        <table class="files-table" id="files-table">
          <thead>
            <tr>
              <th>File Name</th>
              <th>Client</th>
              <th>Project</th>
              <th>Size</th>
              <th>Uploaded</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="6" style="text-align:center;">No files uploaded yet.</td></tr>
          </tbody>
        </table>
        </div>
        <!-- TODO: Replace with dynamic listing from Firebase Storage -->
      </section>
    </main>
  </div>
  <script src="js/files.js"></script>
</body>
</html>
