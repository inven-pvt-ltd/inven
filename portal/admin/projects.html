<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Management - Admin</title>
    <style>
        :root {
            --bg-main: rgba(24, 26, 32, 0.95);
            --glass: rgba(17,24,39,0.82);
            --glass-light: rgba(30,41,59,0.72);
            --primary: #6c63ff;
            --accent: #37d67a;
            --danger: #f44336;
            --warning: #ffb300;
            --text: #f8f8ff;
            --muted: #a0a4b8;
            --sidebar-width: 220px;
            --sidebar-collapsed: 64px;
            --transition: 0.25s cubic-bezier(.4,0,.2,1);
            --radius: 24px;
            --shadow: 0 16px 40px rgba(0,0,0,0.32);
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, rgba(108,99,255,0.18), transparent 35%), radial-gradient(circle at bottom left, rgba(55,214,122,0.12), transparent 30%), #0f172a;
            color: var(--text);
            min-height: 100vh;
        }
        body {
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 32px 0 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
        }
        .sidebar .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            margin: 0 0 32px 32px;
        }
        .sidebar nav {
            flex: 1;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li {
            margin-bottom: 8px;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 32px;
            color: var(--muted);
            text-decoration: none;
            font-size: 1rem;
            border-radius: 12px 0 0 12px;
            transition: background var(--transition), color var(--transition);
        }
        .sidebar a.active, .sidebar a:hover {
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            color: var(--text);
        }
        .sidebar a .icon {
            margin-right: 16px;
            font-size: 1.2em;
            width: 22px;
            text-align: center;
        }
        .sidebar .settings {
            margin-top: auto;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: transparent;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px 0 40px;
        }
        .header-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .dashboard-wrapper {
            display: flex;
            flex: 1;
            padding: 24px 40px 40px 40px;
            gap: 32px;
            min-height: 0;
        }
        .kpi-cards { }
        .kpi-card { }
        .dashboard-right {
        }
        @media (max-width: 1100px) {
            .dashboard-wrapper {
                flex-direction: column;
                gap: 24px;
            }
            .dashboard-right {
                flex-direction: row;
                max-width: none;
                min-width: 0;
                gap: 24px;
            }
        }
        @media (max-width: 900px) {
        }
        @media (max-width: 700px) {
            .sidebar {
                position: fixed;
                width: var(--sidebar-collapsed);
                padding: 24px 0 16px 0;
            }
            .sidebar .logo, .sidebar a span:not(.icon) {
                display: none;
            }
            .sidebar a {
                justify-content: center;
                padding: 12px 0;
                border-radius: 12px;
            }
            .main-content {
                margin-left: var(--sidebar-collapsed);
                padding-left: 0;
            }
            .header, .dashboard-wrapper {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
        @media (max-width: 500px) {
            .header-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<aside class="sidebar">
        <div class="logo">Inven</div>
        <nav>
            <ul>
                <li><a href="dashboard.html"><span class="icon">&#x1F4C8;</span><span>Dashboard</span></a></li>
                <li><a class="active" href="projects.html"><span class="icon">&#x1F4C4;</span><span>Projects</span></a></li>

                <li><a href="files.html"><span class="icon">&#x1F4C1;</span><span>Files</span></a></li>
                <li><a href="messages.html"><span class="icon">&#x2709;&#xFE0F;</span><span>Messages</span></a></li>
                <li><a href="invoices.html"><span class="icon">&#x1F4B3;</span><span>Invoices</span></a></li>
            </ul>
        </nav>
    </aside>

<main class="main-content">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:calc(100vh - 5rem);text-align:center;gap:1rem;">
    <div style="font-size:4rem;">🚧</div>
    <h1 style="margin:0;font-size:3rem;color:#fff;">Projects</h1>
    <p style="margin:0;color:#b8c0d4;font-size:1.1rem;max-width:520px;">
      This section is currently under development and will be available soon.
    </p>
    <p style="margin-top:1rem;font-size:1rem;color:#8ea0c9;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;">
      Coming Soon
    </p>
  </div>
</main>

<script src="js/projects.js"></script>
</body>
</html>
