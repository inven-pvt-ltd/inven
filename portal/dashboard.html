<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="INVEN Portal - Dashboard Overview">
  <title>INVEN Portal | Dashboard</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/portal.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-primary" data-page="dashboard">
  <div class="portal-container">
    <div id="sidebar-container"></div>
    <div class="portal-main">
      <div id="navbar-container"></div>
      <main class="portal-content dashboard-page">
        <div class="page-header">
          <div class="page-title-section">
            <div class="page-title">
              <h1>Dashboard</h1>
              <p class="page-description">Project overview, progress, activity, and payment status.</p>
            </div>
            <div class="page-actions">
              <a class="btn btn-primary" href="/portal/revisions/index.html">New Revision</a>
              <a class="btn btn-secondary" href="/portal/files/index.html">Upload File</a>
            </div>
          </div>
        </div>

        <div class="dashboard-grid dashboard-grid-4">
          <div class="stat-card">
            <div class="stat-card-icon">📊</div>
            <div class="stat-card-content">
              <div class="stat-card-label">Active Projects</div>
              <div class="stat-card-value" id="active-projects">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon">🔄</div>
            <div class="stat-card-content">
              <div class="stat-card-label">Open Revisions</div>
              <div class="stat-card-value" id="open-revisions">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon">📄</div>
            <div class="stat-card-content">
              <div class="stat-card-label">Shared Files</div>
              <div class="stat-card-value" id="shared-files">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-icon">💰</div>
            <div class="stat-card-content">
              <div class="stat-card-label">Outstanding</div>
              <div class="stat-card-value" id="outstanding-balance">₹0</div>
              <div class="stat-card-change" id="next-payment-due">No payment currently due</div>
            </div>
          </div>
        </div>

        <div class="dashboard-grid dashboard-grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Project Progress</div>
            </div>
            <div class="card-body">
              <div class="progress-section" id="project-progress-list"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Recent Activity</div>
            </div>
            <div class="card-body">
              <div class="activity-feed" id="recent-activity-list"></div>
            </div>
          </div>
        </div>
      </main>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/mvp.js"></script>
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/components.js"></script>
</body>
</html>
