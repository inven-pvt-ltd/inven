<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVEN Portal | Invoices</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/portal.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body class="bg-primary" data-page="invoices">
  <div class="portal-container">
    <div id="sidebar-container"></div>
    <div class="portal-main">
      <div id="navbar-container"></div>
      <main class="portal-content invoices-page">
        <div class="page-header">
          <div class="page-title-section">
            <div class="page-title">
              <h1>Invoices</h1>
              <p class="page-description">View invoices, payment status, and download PDFs.</p>
            </div>
            <div class="page-actions"><span class="badge badge-warning" id="invoice-summary">Outstanding: ₹0</span></div>
          </div>
        </div>
        <section class="card">
          <div class="table-wrap">
            <table class="data-table" id="invoice-table">
              <thead><tr><th>Invoice</th><th>Project</th><th>Amount</th><th>Status</th><th>Due Date</th><th>PDF</th></tr></thead>
              <tbody><tr><td colspan="6">Loading invoices...</td></tr></tbody>
            </table>
          </div>
        </section>
      </main>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <script defer src="../js/firebase-config.js"></script>
  <script defer src="../js/auth.js"></script>
  <script defer src="../js/mvp.js"></script>
  <script defer src="../js/invoices.js"></script>
  <script defer src="../js/components.js"></script>
</body>
</html>
