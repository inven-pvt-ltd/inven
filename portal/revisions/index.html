<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVEN Portal | Revision Requests</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/portal.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body class="bg-primary" data-page="revisions">
  <div class="portal-container">
    <div id="sidebar-container"></div>
    <div class="portal-main">
      <div id="navbar-container"></div>
      <main class="portal-content revisions-page">
        <div class="page-header">
          <div class="page-title-section">
            <div class="page-title">
              <h1>Revision Requests</h1>
              <p class="page-description">Submit website changes without a messaging system.</p>
            </div>
          </div>
        </div>
        <div class="dashboard-grid dashboard-grid-2">
          <form class="card" id="revision-form">
            <div class="card-header"><div class="card-title">New Request</div></div>
            <div class="form-group">
              <label class="form-label required" for="title">Revision Title</label>
              <input class="form-input" id="title" name="title" type="text" required>
            </div>
            <div class="form-group">
              <label class="form-label required" for="description">Description</label>
              <textarea class="form-textarea" id="description" name="description" required></textarea>
            </div>
            <div class="field-grid">
              <div class="form-group">
                <label class="form-label" for="priority">Priority</label>
                <select class="form-select" id="priority" name="priority">
                  <option>Low</option>
                  <option selected>Medium</option>
                  <option>High</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="file">Optional File/Image</label>
                <input class="form-input file-input" id="file" name="file" type="file">
              </div>
            </div>
            <button class="btn btn-primary" type="submit">Submit Request</button>
            <p class="status-message" id="revision-message"></p>
          </form>
          <section class="card">
            <div class="card-header"><div class="card-title">My Requests</div></div>
            <div class="table-wrap">
              <table class="data-table" id="revision-table">
                <thead><tr><th>Title</th><th>Priority</th><th>Status</th><th>Created</th><th>File</th></tr></thead>
                <tbody><tr><td colspan="5">Loading revision requests...</td></tr></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
      <div id="footer-container"></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <script defer src="../js/firebase-config.js"></script>
  <script defer src="../js/auth.js"></script>
  <script defer src="../js/mvp.js"></script>
  <script defer src="../js/revisions.js"></script>
  <script defer src="../js/components.js"></script>
</body>
</html>
