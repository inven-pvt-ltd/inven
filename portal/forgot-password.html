<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVEN Portal | Reset Password</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/portal.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body class="bg-primary">
  <main class="portal-content" style="min-height:100vh;display:grid;place-items:center;">
    <form class="form-wrapper" id="reset-form">
      <h1 class="form-title">Reset Password</h1>
      <p class="form-subtitle">Enter your portal email and Firebase will send a password reset link.</p>
      <div class="form-group">
        <label class="form-label required" for="email">Email Address</label>
        <input class="form-input" id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Send Reset Link</button>
      <p class="status-message" id="reset-message"></p>
      <div class="form-actions stacked">
        <a class="btn btn-ghost" href="login.html">Back to Login</a>
      </div>
    </form>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = document.getElementById('reset-message');
      message.textContent = 'Sending reset link...';
      try {
        await window.firebaseAuth.sendPasswordResetEmail(event.target.email.value.trim());
        message.textContent = 'Password reset email sent.';
        message.className = 'status-message success';
      } catch (error) {
        message.textContent = error.message || 'Unable to send reset email.';
        message.className = 'status-message error';
      }
    });
  </script>
</body>
</html>
